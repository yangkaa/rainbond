name: orchestrator-stage-go

on:
  workflow_call:
    inputs:
      feature_id:
        required: true
        type: string
      engine:
        required: true
        type: string
      strict_verify:
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      feature_id:
        description: Feature ID (e.g. RB-123)
        required: true
        type: string
      engine:
        description: Engine used by orchestrator
        required: true
        default: opencode
        type: choice
        options:
          - opencode
          - claude
      strict_verify:
        description: Run stricter verification commands
        required: true
        default: false
        type: boolean

jobs:
  verify-go:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: yangkaa/rainbond
          ref: workflow

      - name: Execute Go stage checks
        id: verify_go
        shell: bash
        run: |
          set -uo pipefail
          FEATURE_ID="${{ inputs.feature_id }}"
          ENGINE="${{ inputs.engine }}"
          STRICT="${{ inputs.strict_verify }}"

          mkdir -p /tmp/orchestrator
          RAW_LOG="/tmp/orchestrator/raw-go-${FEATURE_ID}.log"
          SUMMARY_JSON="/tmp/orchestrator/verify-summary-go-${FEATURE_ID}.json"

          {
            echo "feature_id=${FEATURE_ID}"
            echo "engine=${ENGINE}"
            echo "strict_verify=${STRICT}"
            echo "repo=rainbond"
            echo "stage=go"
            echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "pwd=$(pwd)"
            ls -la
          } > "${RAW_LOG}"

          export GOFLAGS="-mod=mod"
          echo "GOFLAGS=${GOFLAGS}" >> "${RAW_LOG}"

          rc=0
          if [[ "${STRICT}" == "true" ]]; then
            {
              echo "running: go build ./..."
              go build ./...
              echo "running: go vet ./..."
              go vet ./...
            } >> "${RAW_LOG}" 2>&1 || rc=$?
          else
            {
              echo "running: go version"
              go version
              echo "running: go list ./..."
              go list ./...
            } >> "${RAW_LOG}" 2>&1 || rc=$?
          fi

          status="passed"
          if [[ "${rc}" -ne 0 ]]; then
            status="failed"
          fi

          cat > "${SUMMARY_JSON}" <<JSON
          {
            "feature_id": "${FEATURE_ID}",
            "repo": "rainbond",
            "stage": "go",
            "engine": "${ENGINE}",
            "strict_verify": ${STRICT},
            "status": "${status}"
          }
          JSON

          echo "rc=${rc}" >> "$GITHUB_OUTPUT"
          cat "${SUMMARY_JSON}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload raw go verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-raw-go-${{ inputs.feature_id }}
          path: /tmp/orchestrator/raw-go-${{ inputs.feature_id }}.log

      - name: Upload go summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-summary-go-${{ inputs.feature_id }}
          path: /tmp/orchestrator/verify-summary-go-${{ inputs.feature_id }}.json

      - name: Print raw go log to summary
        if: always()
        shell: bash
        run: |
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat "/tmp/orchestrator/raw-go-${{ inputs.feature_id }}.log" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when go checks failed
        if: steps.verify_go.outputs.rc != '0'
        run: exit 1
